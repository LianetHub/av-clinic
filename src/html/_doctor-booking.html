<section class="doctor-booking">
    <div class="doctor-booking__container container">
        <div class="section-header row">
            <div class="col-lg-6">
                <div class="section-header__caption">расписание</div>
            </div>
            <div class="col-lg-6">
                <h2 class="section-header__title title color-accent">Онлайн запись</h2>
                <p class="section-header__desc">Выберите удобный день и&nbsp;время, чтобы записаться без лишних звонков. После выбора слота можно сразу оставить контакты для подтверждения визита.</p>
            </div>
        </div>
        <div class="doctor-booking__body">
            <div class="row">
                <div class="col-lg-6">
                    <div class="doctor-calendar">
                        <div class="doctor-calendar__head">
                            <button type="button" class="doctor-calendar__nav icon-arrow-left" aria-label="Предыдущий месяц"></button>
                            <div class="doctor-calendar__month">Июль 2026</div>
                            <button type="button" class="doctor-calendar__nav icon-arrow-right" aria-label="Следующий месяц"></button>
                        </div>
                        <div class="doctor-calendar__weekdays">
                            <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
                        </div>
                        <div class="doctor-calendar__days">
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_disabled" disabled>29</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_disabled" disabled>30</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_disabled" disabled>1</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_disabled" disabled>2</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_disabled" disabled>3</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_selected" aria-pressed="true">4</button>
                            <button type="button" class="doctor-calendar__day">5</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_available">6</button>
                            <button type="button" class="doctor-calendar__day">7</button>
                            <button type="button" class="doctor-calendar__day">8</button>
                            <button type="button" class="doctor-calendar__day">9</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_available">10</button>
                            <button type="button" class="doctor-calendar__day">11</button>
                            <button type="button" class="doctor-calendar__day">12</button>
                            <button type="button" class="doctor-calendar__day">13</button>
                            <button type="button" class="doctor-calendar__day">14</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_available">15</button>
                            <button type="button" class="doctor-calendar__day">16</button>
                            <button type="button" class="doctor-calendar__day">17</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_available">18</button>
                            <button type="button" class="doctor-calendar__day">19</button>
                            <button type="button" class="doctor-calendar__day">20</button>
                            <button type="button" class="doctor-calendar__day">21</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_available">22</button>
                            <button type="button" class="doctor-calendar__day">23</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_available">24</button>
                            <button type="button" class="doctor-calendar__day">25</button>
                            <button type="button" class="doctor-calendar__day">26</button>
                            <button type="button" class="doctor-calendar__day">27</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_available">28</button>
                            <button type="button" class="doctor-calendar__day">29</button>
                            <button type="button" class="doctor-calendar__day">30</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_available">31</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_disabled" disabled>1</button>
                            <button type="button" class="doctor-calendar__day doctor-calendar__day_disabled" disabled>2</button>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="doctor-booking__panel">
                        <p class="doctor-booking__empty">На этот день нет расписания</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
