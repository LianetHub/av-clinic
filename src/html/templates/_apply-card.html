<li class="apply__card" data-animate="bottom">
    <a href="@@url" class="apply__card-link" target="_blank">
        <div class="apply__card-icon">
            <img src="@@iconUrl" alt="@@title">
        </div>
        <h3 class="apply__card-title">@@title</h3>
        <div class="apply__card-external-icon icon-share"></div>
    </a>
</li>
