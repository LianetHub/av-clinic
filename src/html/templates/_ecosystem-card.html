<li class="ecosystem__card" data-animate="bottom">
    <div class="ecosystem__card-header">
        <div class="ecosystem__card-icon">
            <img src="@@iconUrl" alt="Иконка">
        </div>
        <h3 class="ecosystem__card-title@@if(typeof titleSize !=='undefined'){ ecosystem__card-title--size-@@titleSize}">@@title</h3>
    </div>
    <p class="ecosystem__card-text">@@text</p>
</li>
