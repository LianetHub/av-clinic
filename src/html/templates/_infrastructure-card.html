<li class="infrastructure__card" data-animate="bottom">
    <h3 class="infrastructure__card-title">@@title</h3>
    <div class="infrastructure__card-image">
        <img src="@@imageUrl" class="cover-image" alt="@@title">
    </div>
    <div class="infrastructure__card-body">
        <p class="infrastructure__card-text">@@text</p>
    </div>
</li>
