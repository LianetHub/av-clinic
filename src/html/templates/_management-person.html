<li class="management__person" data-animate="bottom">
    <h3 class="management__person-name">@@name</h3>
    <p class="management__person-position">@@position</p>
    <div class="management__person-contacts">
        <a href="tel:@@phoneRaw" class="management__person-link icon-phone">@@phone</a>
        <a href="mailto:@@email" class="management__person-link icon-envelope">@@email</a>
    </div>
</li>
