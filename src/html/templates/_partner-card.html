<li class="partners__card" data-animate="bottom">
    <div class="partners__card-image">
        <img src="@@imageUrl" class="cover-image" alt="@@name">
    </div>
    <div class="partners__card-content">
        <h3 class="partners__card-name">@@name</h3>
        <p class="partners__card-text">@@description</p>
    </div>
</li>
